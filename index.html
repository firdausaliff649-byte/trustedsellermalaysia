<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Trusted Malaysia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
overflow-x:hidden;
color:white;
min-height:100vh;
}

video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.68);
backdrop-filter:blur(2px);
z-index:-1;
}

.container{
max-width:1150px;
margin:auto;
padding:25px 12px;
}

.title{
text-align:center;
margin-bottom:35px;
animation:fadeDown 1s ease;
}

.logo{
width:100px;
margin-bottom:18px;
filter:drop-shadow(0 0 20px #8c00ff);
animation:float 3s ease-in-out infinite;
}

.title h1{
font-size:45px;
font-weight:800;
background:linear-gradient(to right,#ff00ff,#00bfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title p{
margin-top:8px;
font-size:15px;
opacity:.8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:18px;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:28px;
padding:18px;
box-shadow:
0 0 18px rgba(0,191,255,.18),
0 0 30px rgba(255,0,255,.15);
transition:.3s;
animation:show .8s ease;
text-align:center;
}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

.profile{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.15);
margin:auto;
display:block;
box-shadow:
0 0 15px #00bfff,
0 0 25px #ff00ff;
margin-bottom:15px;
}

.name{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:7px 16px;
border-radius:999px;
font-size:12px;
font-weight:700;
background:linear-gradient(to right,#00bfff,#ff00ff);
margin-bottom:15px;
}

.phone{
font-size:18px;
font-weight:700;
margin-bottom:15px;
}

.btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-size:15px;
font-weight:700;
cursor:pointer;
text-decoration:none;
text-align:center;
transition:.3s;
margin-top:8px;
}

.wa{
background:linear-gradient(to right,#00bfff,#0077ff);
color:white;
}

.wa:hover{
transform:scale(1.03);
}

.delete{
background:#ff003c;
color:white;
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
width:68px;
height:68px;
border:none;
border-radius:50%;
font-size:28px;
cursor:pointer;
background:linear-gradient(to right,#ff00ff,#00bfff);
color:white;
z-index:999;
box-shadow:
0 0 20px #00bfff,
0 0 35px #ff00ff;
}

.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.box{
background:#120018;
width:100%;
max-width:450px;
padding:25px;
border-radius:28px;
border:1px solid rgba(255,255,255,.08);
}

.box h2{
font-size:28px;
margin-bottom:20px;
text-align:center;
}

.input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
}

.save{
background:linear-gradient(to right,#ff00ff,#00bfff);
color:white;
}

.close{
background:#333;
color:white;
}

#welcome{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
animation:fadeOut 1.5s ease forwards;
animation-delay:3s;
}

#welcome h1{
font-size:50px;
font-weight:800;
text-align:center;
background:linear-gradient(to right,#ff00ff,#00bfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:zoom 1s ease;
}

#welcome p{
margin-top:10px;
font-size:18px;
opacity:.85;
animation:slide 1s ease;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

@keyframes zoom{
0%{
transform:scale(.5);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes slide{
0%{
transform:translateY(40px);
opacity:0;
}
100%{
transform:translateY(0);
opacity:1;
}
}

@keyframes show{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

</style>
</head>

<body>

<div id="welcome">
<h1>SELAMAT DATANG</h1>
<p>DI WEB SELLER TRUSTED MALAYSIA</p>
</div>

<video class="bg" autoplay muted loop playsinline>
<source src="https://files.catbox.moe/6rh8xt.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<div class="title">

<img src="logo.png" class="logo">

<h1>Seller Trusted Malaysia</h1>
<p>Premium Trusted Seller Official Website</p>

</div>

<div class="grid" id="sellerList"></div>

</div>

<button class="admin-btn" onclick="openLogin()">⚙</button>

<div class="panel" id="loginPanel">
<div class="box">

<h2>Admin Login</h2>

<input type="password"
id="adminPass"
class="input"
placeholder="Password">

<button class="btn save"
onclick="loginAdmin()">
LOGIN
</button>

<button class="btn close"
onclick="closeLogin()">
CLOSE
</button>

</div>
</div>

<div class="panel" id="adminPanel">
<div class="box">

<h2>Add Seller</h2>

<input type="text"
id="name"
class="input"
placeholder="Seller Name">

<input type="text"
id="phone"
class="input"
placeholder="60123456789">

<input type="text"
id="image"
class="input"
placeholder="Profile Image URL">

<button class="btn save"
onclick="addSeller()">
ADD SELLER
</button>

<button class="btn close"
onclick="closeAdmin()">
CLOSE
</button>

</div>
</div>

<script>

let adminLoggedIn = false;

const password = "KizxGantengAmat125";

let sellers = [

{
name:"Kizx Store",
phone:"601161019275",
image:"IMG-20260526-WA0420.jpg"
},

{
name:"Kael Store",
phone:"60136198316",
image:"https://files.catbox.moe/sm2lvd.jpg"
},

{
name:"IKYY Store",
phone:"601161834315",
image:"https://files.catbox.moe/rj3tbw.jpg"
},

{
name:"Minz Store",
phone:"60137750974",
image:"https://files.catbox.moe/qgqf6v.jpg"
},

{
name:"Yanzary Store",
phone:"601137650485",
image:"https://files.catbox.moe/bjtvh8.jpg"
},

{
name:"Ipanz Store",
phone:"60175970694",
image:"https://files.catbox.moe/wnx2ny.jpg"
}

];

const sellerList =
document.getElementById("sellerList");

function render(){

sellerList.innerHTML = "";

sellers.forEach((item,index)=>{

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${item.image}"
class="profile">

<div class="name">
${item.name}
</div>

<div class="badge">
TRUSTED SELLER
</div>

<div class="phone">
📞 ${item.phone}
</div>

<a class="btn wa"
href="https://wa.me/${item.phone}"
target="_blank">

CHAT WHATSAPP

</a>

${adminLoggedIn ? `

<button class="btn delete"
onclick="deleteSeller(${index})">

DELETE

</button>

` : ``}

`;

sellerList.appendChild(card);

});

}

render();

function openLogin(){

document.getElementById(
"loginPanel"
).style.display = "flex";

}

function closeLogin(){

document.getElementById(
"loginPanel"
).style.display = "none";

}

function loginAdmin(){

const pass =
document.getElementById(
"adminPass"
).value;

if(pass === password){

adminLoggedIn = true;

render();

document.getElementById(
"loginPanel"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "flex";

alert("Admin Login Success");

}else{

alert("Wrong Password");

}

}

function closeAdmin(){

document.getElementById(
"adminPanel"
).style.display = "none";

}

function addSeller(){

const name =
document.getElementById(
"name"
).value.trim();

let phone =
document.getElementById(
"phone"
).value.trim();

const image =
document.getElementById(
"image"
).value.trim();

phone =
phone.replace(/[^0-9]/g,"");

if(name === "" ||
phone === "" ||
image === ""){

alert("Complete all input");
return;

}

sellers.push({
name,
phone,
image
});

render();

document.getElementById(
"name"
).value = "";

document.getElementById(
"phone"
).value = "";

document.getElementById(
"image"
).value = "";

alert("Seller Added");

}

function deleteSeller(index){

if(!adminLoggedIn) return;

const ask =
confirm("Delete Seller?");

if(!ask) return;

sellers.splice(index,1);

render();

}

</script>

</body>
  </html>
