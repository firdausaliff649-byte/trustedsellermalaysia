<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Trusted Malaysia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#120018,#4b0082,#00bfff);
min-height:100vh;
padding:30px 15px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

.title{
text-align:center;
margin-bottom:40px;
}

.title h1{
font-size:55px;
font-weight:800;
background:linear-gradient(to right,#ff5cff,#7df9ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title p{
opacity:.8;
margin-top:10px;
}

.section-title{
font-size:35px;
font-weight:800;
margin:40px 0 20px;
background:linear-gradient(to right,#ff6bff,#7df9ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
border-radius:30px;
padding:25px;
box-shadow:
0 0 30px rgba(0,191,255,.2),
0 0 60px rgba(255,0,255,.15);
transition:.3s;
overflow:hidden;
}

.card:hover{
transform:translateY(-8px);
}

.top{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.2);
box-shadow:
0 0 20px #00bfff,
0 0 35px #ff00ff;
}

.name{
font-size:28px;
font-weight:700;
}

.desc{
opacity:.8;
font-size:14px;
margin-top:3px;
}

.badge{
display:inline-block;
margin-top:10px;
padding:7px 18px;
border-radius:999px;
font-size:13px;
font-weight:700;
background:linear-gradient(to right,#00bfff,#ff00ff);
}

.phone{
margin:20px 0;
font-size:23px;
font-weight:700;
}

.btn{
display:block;
width:100%;
padding:17px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
text-decoration:none;
text-align:center;
margin-top:10px;
transition:.3s;
}

.wa{
background:linear-gradient(to right,#00bfff,#008cff);
color:white;
}

.delete{
background:#ff003c;
color:white;
}

.admin-btn{
position:fixed;
bottom:25px;
right:25px;
width:70px;
height:70px;
border-radius:50%;
border:none;
font-size:30px;
cursor:pointer;
background:linear-gradient(to right,#ff00ff,#00bfff);
color:white;
z-index:999;
}

.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.box{
background:#1a0027;
width:100%;
max-width:500px;
padding:30px;
border-radius:30px;
}

.box h2{
margin-bottom:20px;
font-size:30px;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
}

.save{
background:linear-gradient(to right,#ff00ff,#00bfff);
color:white;
}

.close{
background:#333;
color:white;
}

.scammer{
border:1px solid rgba(255,0,0,.4);
}

</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>Seller Trusted Malaysia</h1>
<p>Premium Trusted Seller & Scammer List</p>
</div>

<h2 class="section-title">TRUSTED SELLER</h2>
<div class="grid" id="sellerList"></div>

<h2 class="section-title">SCAMMER LIST</h2>
<div class="grid" id="scammerList"></div>

</div>

<button class="admin-btn" onclick="openLogin()">⚙</button>

<div class="panel" id="loginPanel">
<div class="box">

<h2>Admin Login</h2>

<input type="password"
id="adminPass"
class="input"
placeholder="Password">

<button class="btn save"
onclick="loginAdmin()">
LOGIN
</button>

<button class="btn close"
onclick="closeLogin()">
CLOSE
</button>

</div>
</div>

<div class="panel" id="adminPanel">
<div class="box">

<h2>Add Data</h2>

<select id="type" class="input">
<option value="seller">Seller</option>
<option value="scammer">Scammer</option>
</select>

<input type="text"
id="name"
class="input"
placeholder="Name">

<input type="text"
id="desc"
class="input"
placeholder="Description">

<input type="text"
id="phone"
class="input"
placeholder="60123456789">

<input type="file"
id="image"
class="input">

<button class="btn save"
id="addBtn"
onclick="addData()">
ADD DATA
</button>

<button class="btn close"
onclick="closeAdmin()">
CLOSE
</button>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCEw6ibJubeJPMRiXekvWa6ENe5T2ik2ZA",

databaseURL:
"https://sellertrustedmalaysia-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "sellertrustedmalaysia",

storageBucket:
"sellertrustedmalaysia.appspot.com",

messagingSenderId: "000000000",

appId: "1:000000:web:000000"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const sellerList =
document.getElementById("sellerList");

const scammerList =
document.getElementById("scammerList");

function render(){

onValue(ref(db,"data"),(snapshot)=>{

sellerList.innerHTML = "";
scammerList.innerHTML = "";

const data = snapshot.val();

if(!data) return;

Object.entries(data).forEach(([key,item])=>{

const card = document.createElement("div");

card.className =
item.type === "scammer"
? "card scammer"
: "card";

card.innerHTML = `

<div class="top">

<img src="${item.image}"
class="avatar">

<div>

<div class="name">
${item.name}
</div>

<div class="desc">
${item.desc}
</div>

<div class="badge">
${item.type.toUpperCase()}
</div>

</div>
</div>

<div class="phone">
📞 ${item.phone}
</div>

<a class="btn wa"
href="https://wa.me/${item.phone}"
target="_blank">

Chat WhatsApp

</a>

<button class="btn delete"
onclick="deleteData('${key}')">

DELETE

</button>

`;

if(item.type === "seller"){
sellerList.appendChild(card);
}else{
scammerList.appendChild(card);
}

});

});

}

render();

window.deleteData = async function(id){

const ask =
confirm("Delete this data?");

if(!ask) return;

await remove(ref(db,"data/"+id));

}

window.openLogin = function(){

document.getElementById(
"loginPanel"
).style.display = "flex";

}

window.closeLogin = function(){

document.getElementById(
"loginPanel"
).style.display = "none";

}

window.loginAdmin = function(){

const pass =
document.getElementById(
"adminPass"
).value;

if(pass === "KizxGantengAmat125"){

document.getElementById(
"loginPanel"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "flex";

}else{

alert("Wrong Password");

}

}

window.closeAdmin = function(){

document.getElementById(
"adminPanel"
).style.display = "none";

}

window.addData = async function(){

const type =
document.getElementById(
"type"
).value;

const name =
document.getElementById(
"name"
).value.trim();

const desc =
document.getElementById(
"desc"
).value.trim();

let phone =
document.getElementById(
"phone"
).value.trim();

phone =
phone.replace(/[^0-9]/g,"");

const file =
document.getElementById(
"image"
).files[0];

if(name === "" ||
desc === "" ||
phone === ""){

alert("Complete all input");
return;

}

if(phone.length < 10){

alert("Invalid phone");
return;

}

if(!file){

alert("Select image");
return;

}

if(file.size > 2000000){

alert("Image max 2MB");
return;

}

const btn =
document.getElementById(
"addBtn"
);

btn.innerHTML = "Loading...";
btn.disabled = true;

const reader =
new FileReader();

reader.onload = async function(e){

try{

const image =
e.target.result;

await push(ref(db,"data"),{

type,
name,
desc,
phone,
image,
createdAt: Date.now()

});

alert("Success Add Data");

document.getElementById(
"name"
).value = "";

document.getElementById(
"desc"
).value = "";

document.getElementById(
"phone"
).value = "";

document.getElementById(
"image"
).value = "";

}catch(err){

console.log(err);

alert(
"Firebase Error"
);

}

btn.innerHTML = "ADD DATA";
btn.disabled = false;

}

reader.onerror = function(){

alert("Failed Read Image");

btn.innerHTML = "ADD DATA";
btn.disabled = false;

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
